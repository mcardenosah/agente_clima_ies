<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agente Termohigrométrico - IES Renaturalización</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f8fafc; }
        .chart-container { position: relative; height: 350px; width: 100%; }
        .chart-container-large { position: relative; height: 450px; width: 100%; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .drop-zone { border: 2px dashed #cbd5e1; transition: all 0.2s ease; }
        .drop-zone.dragover { border-color: #10b981; background-color: #ecfdf5; }
        .heatmap-grid { display: grid; grid-template-columns: 80px repeat(24, 1fr); gap: 2px; }
        .heatmap-cell { height: 24px; border-radius: 2px; transition: all 0.2s; }
        .heatmap-cell:hover { transform: scale(1.3); box-shadow: 0 0 8px rgba(0,0,0,0.4); z-index: 10; border: 1px solid #333; }
        .pdf-export-container { background-color: white; padding: 20px; }
    </style>
</head>
<body class="text-slate-800 h-screen flex flex-col overflow-hidden">

    <nav class="bg-slate-900 text-white shadow-lg shrink-0">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center gap-3">
                    <span class="font-bold text-xl tracking-tight text-emerald-400">Agente Clima IES</span>
                </div>
                <div class="flex space-x-1 py-3">
                    <button onclick="openTab('importar')" id="btn-importar" class="px-4 py-2 rounded-md text-sm font-medium bg-emerald-600 text-white shadow">1. Datos</button>
                    <button onclick="openTab('informe')" id="btn-informe" class="px-4 py-2 rounded-md text-sm font-medium text-slate-300 hover:bg-slate-700 disabled:opacity-50" disabled>2. Informe</button>
                    <button onclick="openTab('dashboard')" id="btn-dashboard" class="px-4 py-2 rounded-md text-sm font-medium text-slate-300 hover:bg-slate-700 disabled:opacity-50" disabled>3. Dashboard</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-1 overflow-y-auto p-4 md:p-8 bg-slate-50 relative">
        <div class="max-w-7xl mx-auto">
            
            <section id="tab-importar" class="tab-content active bg-white rounded-xl shadow-md border border-slate-200 p-8 text-center">
                <h2 class="text-3xl font-extrabold text-slate-900 mb-4">Motor de Procesamiento</h2>
                <div id="drop-zone" class="drop-zone bg-slate-50 rounded-xl p-12 cursor-pointer mx-auto max-w-3xl flex flex-col items-center justify-center">
                    <span class="text-lg font-medium text-slate-700">Arrastra archivos CSV aquí</span>
                    <input type="file" id="file-input" multiple accept=".csv" class="hidden">
                </div>
            </section>

            <section id="tab-informe" class="tab-content bg-white rounded-xl shadow-md border border-slate-200 p-8 pdf-export-container relative">
                <button onclick="exportToPDF('tab-informe', 'Informe_Tecnico')" class="btn-pdf-export absolute top-6 right-6 bg-red-600 text-white px-4 py-2 rounded shadow text-sm">Exportar PDF</button>
                <h1 class="text-3xl font-bold mb-6">Informe de Evaluación</h1>
                <div class="overflow-x-auto my-4">
                    <table class="min-w-full text-sm border-collapse border">
                        <thead class="bg-slate-100">
                            <tr>
                                <th class="p-2 border">Aula</th>
                                <th class="p-2 border">ETA27</th>
                                <th class="p-2 border">T.Máx</th>
                                <th class="p-2 border">ST Mín</th>
                                <th class="p-2 border">ST Med</th>
                                <th class="p-2 border">ST Máx</th>
                            </tr>
                        </thead>
                        <tbody id="informe-tbody"></tbody>
                    </table>
                </div>
            </section>

            <section id="tab-dashboard" class="tab-content bg-white rounded-xl shadow-md border border-slate-200 p-8 pdf-export-container relative">
                <button onclick="exportToPDF('tab-dashboard', 'Dashboard')" class="btn-pdf-export absolute top-6 right-6 bg-red-600 text-white px-4 py-2 rounded shadow text-sm">Exportar PDF</button>
                <div class="space-y-8">
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div class="chart-container"><canvas id="chartETA"></canvas></div>
                        <div class="chart-container"><canvas id="chartISGlobal"></canvas></div>
                    </div>
                    <div class="chart-container-large"><canvas id="chartEvolution"></canvas></div>
                    <div><h2 class="font-bold mb-2">Mapa Calor: Temperatura Real</h2><div id="heatmapTemp"></div></div>
                    <div><h2 class="font-bold mb-2">Mapa Calor: Sensación Térmica (ISGlobal)</h2><div id="heatmapISG"></div></div>
                </div>
            </section>
        </div>
    </main>

    <script>
        let rawData = {}, processedStats = [], chartInstances = {};

        function calculateHeatIndex(t, rh) {
            let tf = t * 9/5 + 32;
            if (tf < 80) return t;
            let hi = -42.379 + 2.04901523*tf + 10.14333127*rh - 0.22475541*tf*rh - 0.00683783*tf*tf - 0.05481717*rh*rh + 0.00122874*tf*tf*rh + 0.00085282*tf*rh*rh - 0.00000199*tf*tf*rh*rh;
            return (hi - 32) * 5/9;
        }

        function getHeatIndexCategory(hi) {
            if (hi < 27) return 'Confort';
            if (hi < 32) return 'Precaución';
            return 'Precaución Extrema';
        }

        function openTab(id) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            if (id === 'dashboard') renderCharts();
        }

        function exportToPDF(id, name) {
            const el = document.getElementById(id);
            el.querySelectorAll('.btn-pdf-export').forEach(b => b.style.display = 'none');
            html2pdf().from(el).save(name + '.pdf').then(() => {
                el.querySelectorAll('.btn-pdf-export').forEach(b => b.style.display = 'block');
            });
        }

        document.getElementById('file-input').addEventListener('change', (e) => {
            // Mock processing for demonstration
            // In a real implementation, PapaParse logic would populate `rawData`
            alert("Archivos cargados. (Lógica de procesado simulada)");
            document.getElementById('btn-informe').disabled = false;
            document.getElementById('btn-dashboard').disabled = false;
            // Mock data population here...
            renderCharts(); 
        });

        function renderCharts() {
            // Placeholder logic to demonstrate charting
            // In real app, this takes `rawData` and renders charts
        }
    </script>
</body>
</html>
